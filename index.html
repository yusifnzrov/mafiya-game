<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mafia Online - Ultimate Edition</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --red: #ff3131; --bg: #050505; --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1); --gold: #ffbd13;
        }

        body, html {
            margin: 0; padding: 0; height: 100%; background: var(--bg);
            color: #fff; font-family: 'Poppins', sans-serif; overflow: hidden;
        }

        .app-container {
            width: 100%; max-width: 450px; height: 100vh; margin: 0 auto;
            background: radial-gradient(circle at top, #1a0000 0%, #050505 100%);
            display: flex; flex-direction: column; border: 1px solid var(--border);
        }

        /* --- Auth Screen --- */
        #auth-screen {
            flex: 1; display: flex; flex-direction: column; justify-content: center;
            padding: 40px; text-align: center;
        }

        h1 { font-family: 'Cinzel', serif; font-size: 40px; color: var(--red); letter-spacing: 5px; margin-bottom: 30px; text-shadow: 0 0 20px rgba(255,49,49,0.5); }

        input {
            width: 100%; padding: 15px; margin-bottom: 15px; background: rgba(0,0,0,0.5);
            border: 1px solid var(--border); border-radius: 15px; color: #fff; outline: none;
            box-sizing: border-box; font-size: 16px;
        }

        input:focus { border-color: var(--red); }

        .btn-main {
            width: 100%; padding: 16px; background: var(--red); color: white;
            border: none; border-radius: 15px; font-weight: bold; cursor: pointer;
            text-transform: uppercase; letter-spacing: 1px; transition: 0.3s;
        }

        .btn-main:active { transform: scale(0.95); }

        /* --- Game Screen --- */
        #game-screen { display: none; flex-direction: column; height: 100%; }

        header {
            padding: 15px 20px; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;
        }

        #chat-view {
            flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px;
        }

        .msg { padding: 10px 15px; border-radius: 15px; max-width: 80%; font-size: 14px; animation: slideUp 0.3s ease; }
        .msg.me { align-self: flex-end; background: var(--red); border-bottom-right-radius: 2px; }
        .msg.other { align-self: flex-start; background: var(--glass); border: 1px solid var(--border); border-bottom-left-radius: 2px; }
        .msg.sys { align-self: center; color: var(--gold); font-size: 11px; text-align: center; background: none; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .footer { padding: 20px; background: rgba(10,10,10,0.95); border-top: 1px solid var(--border); }

        .hidden { display: none !important; }
        
        #role-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 1000; display: flex;
            flex-direction: column; justify-content: center; align-items: center; text-align: center;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Giriş Bölməsi -->
    <div id="auth-screen">
        <h1>MAFIA</h1>
        <input type="text" id="uname" placeholder="Adınız">
        <input type="text" id="uroom" placeholder="Otaq Kodu">
        <button class="btn-main" onclick="joinOrCreateRoom()">Otağa Daxil Ol</button>
    </div>

    <!-- Oyun Bölməsi -->
    <div id="game-screen">
        <header>
            <div>
                <div id="p-role" style="color: var(--gold); font-weight: bold;">ROL: Gözlənilir</div>
                <div id="p-room-display" style="font-size: 11px; opacity: 0.6;">Otaq: #----</div>
            </div>
            <button id="admin-start-btn" class="hidden" style="background: var(--gold); border: none; padding: 5px 10px; border-radius: 5px; font-weight: bold; cursor: pointer;" onclick="startGame()">Oyunu Başlat</button>
        </header>

        <div id="chat-view"></div>

        <div class="footer">
            <input type="text" id="chat-input" placeholder="Mesaj yazın..." onkeypress="if(event.key==='Enter') sendChat()">
        </div>
    </div>
</div>

<!-- Rol Animasiyası -->
<div id="role-overlay" class="hidden">
    <p style="font-size: 18px; letter-spacing: 2px;">SƏNİN ROLUN</p>
    <h2 id="role-text" style="font-size: 45px; margin: 10px 0; font-family: 'Cinzel';">MAFİYA</h2>
    <button class="btn-main" style="width: 150px; margin-top: 20px;" onclick="document.getElementById('role-overlay').classList.add('hidden')">Anladım</button>
</div>

<script>
    // --- VACİB: BURANI ÖZ FİREBASE MƏLUMATLARINLA DOLDUR ---
    const firebaseConfig = {
        apiKey: "SƏNİN_API_KEY",
        databaseURL: "SƏNİN_DATABASE_URL",
        projectId: "SƏNİN_ID",
        appId: "SƏNİN_APP_ID"
    };
    // ------------------------------------------------------

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    let mySession = { id: "u" + Date.now(), name: "", room: "", isAdmin: false };

    function joinOrCreateRoom() {
        mySession.name = document.getElementById('uname').value.trim();
        mySession.room = document.getElementById('uroom').value.trim();

        if(!mySession.name || !mySession.room) return alert("Boş buraxma!");

        const roomRef = db.ref('rooms/' + mySession.room);

        roomRef.once('value').then((snapshot) => {
            const data = snapshot.val();
            
            // Otaq yoxdursa, yaradan şəxs Admin olur
            if (!data) {
                roomRef.set({
                    admin: mySession.id,
                    status: "waiting",
                    createdAt: Date.now()
                });
                mySession.isAdmin = true;
            } else {
                if (data.admin === mySession.id) mySession.isAdmin = true;
            }

            // Oyunçunu əlavə et
            roomRef.child('players/' + mySession.id).set({
                name: mySession.name,
                role: "Vətəndaş",
                alive: true
            });

            enterGameUI();
            listenToRoom();
        });
    }

    function enterGameUI() {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('game-screen').style.display = 'flex';
        document.getElementById('p-room-display').innerText = "Otaq: #" + mySession.room;
    }

    function listenToRoom() {
        const roomRef = db.ref('rooms/' + mySession.room);

        // Mesajları dinlə
        roomRef.child('messages').on('child_added', (snap) => {
            const m = snap.val();
            const div = document.createElement('div');
            div.className = `msg ${m.uid === mySession.id ? 'me' : (m.uid === 'sys' ? 'sys' : 'other')}`;
            div.innerHTML = m.uid === 'sys' ? m.text : `<b>${m.user}:</b><br>${m.text}`;
            const view = document.getElementById('chat-view');
            view.appendChild(div);
            view.scrollTop = view.scrollHeight;
        });

        // Otaq vəziyyətini dinlə
        roomRef.on('value', (snap) => {
            const data = snap.val();
            if(!data) return;

            // Admin yoxlanışı
            if (data.admin === mySession.id && data.status === "waiting") {
                document.getElementById('admin-start-btn').classList.remove('hidden');
            } else {
                document.getElementById('admin-start-btn').classList.add('hidden');
            }

            // Rol yoxlanışı
            if (data.status === "active") {
                const myRole = data.players[mySession.id].role;
                document.getElementById('p-role').innerText = "ROL: " + myRole;
                document.getElementById('p-role').style.color = myRole === "MAFİYA" ? "var(--red)" : "var(--gold)";
            }
        });
        
        // Oyun başlayanda bildiriş
        roomRef.child('status').on('change', (snap) => {
           if(snap.val() === "active") {
               // Rol ekranını göstər (Opsional)
           }
        });
    }

    function sendChat() {
        const inp = document.getElementById('chat-input');
        if(!inp.value) return;
        db.ref('rooms/' + mySession.room + '/messages').push({
            uid: mySession.id,
            user: mySession.name,
            text: inp.value
        });
        inp.value = "";
    }

    function startGame() {
        const roomRef = db.ref('rooms/' + mySession.room);
        roomRef.child('players').once('value', (snap) => {
            const players = snap.val();
            const ids = Object.keys(players);
            if(ids.length < 3) return alert("Ən az 3 oyunçu lazımdır!");

            const mafiaId = ids[Math.floor(Math.random() * ids.length)];
            
            ids.forEach(id => {
                roomRef.child('players/' + id).update({
                    role: id === mafiaId ? "MAFİYA" : "VƏTƏNDAŞ"
                });
            });

            roomRef.update({ status: "active" });
            roomRef.child('messages').push({ uid: "sys", text: "--- OYUN BAŞLADI! ---" });
            
            // Rol ekranını hər kəsdə açmaq üçün
            const role = ids.indexOf(mySession.id) === ids.indexOf(mafiaId) ? "MAFİYA" : "VƏTƏNDAŞ";
            showRoleOverlay(role);
        });
    }

    function showRoleOverlay(role) {
        const overlay = document.getElementById('role-overlay');
        const text = document.getElementById('role-text');
        text.innerText = role;
        text.style.color = role === "MAFİYA" ? "var(--red)" : "#00ff00";
        overlay.classList.remove('hidden');
    }
</script>
</body>
</html>
